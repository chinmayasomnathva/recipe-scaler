<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Scaler Pro</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  font-weight: 400;
  background: #f0f2f7;
  min-height:100vh; padding:24px;
  color: #1a1a2e;
}
.container {
  max-width:1200px; margin:0 auto; background:white;
  border-radius:20px; box-shadow:0 8px 40px rgba(0,0,0,.10); overflow:hidden;
}
.header {
  background: #1a1a2e;
  color:white; padding:22px 36px; display:flex; align-items:center; gap:14px;
}
.header-icon { font-size:1.6rem; }
.header h1 { font-size:1.3rem; font-weight:600; letter-spacing:-.01em; }
.header p  { opacity:.5; font-size:.8rem; margin-top:2px; font-weight:300; }

/* Tabs */
.tabs-bar {
  display:flex; align-items:center; background:#fafafa;
  border-bottom:1px solid #ebebeb; padding:0 20px; overflow-x:auto;
}
.tab-btn {
  padding:12px 16px; border:none; background:none; cursor:pointer;
  font-size:.83rem; font-weight:500; color:#999; font-family:inherit;
  border-bottom:2px solid transparent; white-space:nowrap; transition:all .15s;
}
.tab-btn.active { color:#1a1a2e; border-bottom-color:#1a1a2e; }
.tab-btn:hover:not(.active) { color:#555; }
.tab-close {
  margin-left:6px; color:#ccc; cursor:pointer;
  border-radius:50%; padding:1px 4px; font-size:.75rem;
}
.tab-close:hover { background:#fee; color:#e53e3e; }
.add-tab-btn {
  padding:6px 14px; background:none; border:none; font-family:inherit;
  cursor:pointer; font-size:1.1rem; color:#aaa; transition:color .15s;
}
.add-tab-btn:hover { color:#1a1a2e; }

/* Panels */
.panel { display:none; padding:28px 36px; }
.panel.active { display:block; }
.section-title {
  font-size:.7rem; font-weight:600; color:#aaa; text-transform:uppercase;
  letter-spacing:.1em; margin-bottom:14px;
}

/* Config grid */
.cfg-grid {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:14px; margin-bottom:24px;
}
.fg { display:flex; flex-direction:column; }
label { font-weight:500; color:#777; margin-bottom:5px; font-size:.78rem; letter-spacing:.02em; }
input, select {
  padding:8px 10px; border:1.5px solid #e8e8e8;
  border-radius:8px; font-size:.88rem; font-family:inherit;
  transition:border-color .15s; background:white; color:#1a1a2e;
}
input:focus, select:focus { outline:none; border-color:#1a1a2e; }
.irow { display:flex; gap:6px; }
.irow input  { flex:1; }
.irow select { flex:0 0 140px; }

/* Ingredient table */
.ing-wrap {
  background:#fafafa; padding:16px; border-radius:12px; margin-bottom:16px;
  border:1px solid #ebebeb;
}
.paste-hint {
  background:#f5f5f5; border-left:3px solid #ccc;
  padding:8px 12px; border-radius:4px; font-size:.78rem;
  margin-bottom:12px; color:#888; line-height:1.6; font-family:'DM Mono',monospace;
}
.tbl-wrap { overflow-x:auto; outline:none; }
table.it {
  width:100%; border-collapse:collapse; background:white;
  border-radius:8px; overflow:hidden; font-size:.84rem; min-width:500px;
  border:1px solid #ebebeb;
}
table.it th {
  background:#f5f5f5; color:#888; padding:8px 10px;
  text-align:left; font-weight:600; font-size:.72rem; text-transform:uppercase; letter-spacing:.06em;
  border-bottom:1px solid #ebebeb;
}
table.it td {
  padding:6px 8px; border-bottom:1px solid #f5f5f5; vertical-align:middle;
}
table.it tr:last-child td { border-bottom:none; }
table.it tr:hover td { background:#fafafa; }
table.it input[type=text]   { min-width:120px; width:100%; border-color:#eee; }
table.it input[data-f="qty"] { width:90px; border-color:#eee; }
table.it select { font-size:.82rem; padding:5px 6px; border-color:#eee; }

/* Buttons */
.brow { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.btn {
  padding:8px 16px; border:none; border-radius:8px; font-family:inherit;
  font-size:.83rem; font-weight:500; cursor:pointer; transition:all .15s;
}
.bp { background:#1a1a2e; color:white; }
.bp:hover { background:#2d2d4a; }
.bg { background:#f0f0f0; color:#555; }
.bg:hover { background:#e5e5e5; }
.bn { background:#e6f7ee; color:#1a7a45; border:1px solid #b8e8cd; }
.bn:hover { background:#d0f0df; }
.br { background:#fee; color:#c0392b; border:1px solid #fcc; }
.br:hover { background:#fdd; }
.sm { padding:5px 10px; font-size:.76rem; }

/* Results */
.results {
  background:#fafafa; padding:22px; border-radius:14px; margin-top:22px;
  border:1px solid #ebebeb;
}
.results-header {
  font-size:.7rem; font-weight:600; color:#aaa; text-transform:uppercase;
  letter-spacing:.1em; margin-bottom:14px;
}
.sinfo {
  background:white; padding:12px 16px; border-radius:8px; margin-bottom:14px;
  display:flex; gap:24px; flex-wrap:wrap; border:1px solid #ebebeb;
}
.si-lbl { font-size:.68rem; color:#bbb; text-transform:uppercase; letter-spacing:.05em; }
.si-val { font-size:.92rem; font-weight:500; color:#1a1a2e; margin-top:2px; }
.si-val.big { font-size:1.3rem; font-weight:600; color:#1a1a2e; }
table.rt {
  width:100%; border-collapse:collapse; background:white;
  border-radius:8px; overflow:hidden; border:1px solid #ebebeb;
}
table.rt th {
  background:#f5f5f5; color:#888; padding:8px 12px; text-align:left;
  font-weight:600; font-size:.7rem; text-transform:uppercase; letter-spacing:.06em;
  border-bottom:1px solid #ebebeb;
}
table.rt td { padding:9px 12px; border-bottom:1px solid #f5f5f5; font-size:.86rem; }
table.rt tr:last-child td { border-bottom:none; }
table.rt tr:hover td { background:#fafafa; }
.ing-name  { color:#1a1a2e; font-weight:500; }
.col-orig  { color:#bbb; font-family:'DM Mono',monospace; font-size:.8rem; }
.col-scaled{ color:#555; font-family:'DM Mono',monospace; font-size:.8rem; }
.col-kitchen{ color:#1a7a45; font-family:'DM Mono',monospace; font-size:.86rem; font-weight:500; }
.liq-badge {
  display:inline-block; padding:1px 6px; border-radius:4px; margin-left:5px;
  font-size:.65rem; font-weight:600; background:#e8f4fd; color:#2980b9;
  text-transform:uppercase; letter-spacing:.04em;
}

/* Tally validation */
.tally {
  margin-top:14px; padding:14px 16px; background:white;
  border-radius:8px; border:1px solid #ebebeb;
}
.tally-row {
  display:flex; justify-content:space-between; align-items:baseline;
  padding:4px 0; font-size:.84rem; border-bottom:1px solid #f5f5f5;
}
.tally-row:last-child { border-bottom:none; padding-top:8px; }
.tally-label { color:#888; }
.tally-val { font-family:'DM Mono',monospace; font-weight:500; color:#1a1a2e; }
.tally-status { font-weight:500; flex-direction:column; gap:4px; }
.tally-hint { font-size:.72rem; color:#aaa; font-weight:400; }
.tally-skipped { font-size:.72rem; color:#bbb; margin-top:6px; font-style:italic; }

/* Conversion legend */
.legend {
  margin-top:14px; padding:12px 16px; background:white;
  border-radius:8px; border:1px solid #ebebeb;
}
.legend-title {
  font-size:.68rem; font-weight:600; color:#bbb; text-transform:uppercase;
  letter-spacing:.08em; margin-bottom:8px;
}
.legend-item {
  display:inline-block; margin:3px 6px 3px 0;
  padding:3px 10px; background:#f5f5f5; border-radius:20px;
  font-size:.76rem; color:#555; font-family:'DM Mono',monospace;
}

.hidden { display:none; }
.notif {
  position:fixed; top:16px; right:16px; background:#1a1a2e; color:white;
  padding:10px 18px; border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,.2);
  font-size:.83rem; font-weight:500; z-index:9999; animation:slin .2s ease-out;
}
@keyframes slin { from{transform:translateY(-10px);opacity:0} to{transform:translateY(0);opacity:1} }
@media(max-width:700px){
  .panel{padding:15px;}
  .header{padding:16px 18px;}
  .header h1{font-size:1.1rem;}
  .cfg-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-icon">🍳</div>
    <div>
      <h1>Recipe Scaler Pro</h1>
      <p>Scale multiple recipes · paste from Excel · smart unit conversion</p>
    </div>
  </div>
  <div class="tabs-bar" id="tabsBar">
    <button class="add-tab-btn" onclick="addRecipe()">＋</button>
  </div>
  <div id="panels"></div>
</div>

<script>
// ─── Conversion tables ────────────────────────────────────────────────────────
const CUP_TO_LBS = {
  'all purpose flour':0.275,'bread flour':0.29,'cake flour':0.25,'flour':0.275,
  'granulated sugar':0.44,'sugar':0.44,'brown sugar':0.48,'powdered sugar':0.28,
  'confectioners sugar':0.28,'icing sugar':0.28,
  'butter':0.5,'shortening':0.43,
  'oil':0.48,'olive oil':0.48,'vegetable oil':0.47,
  'water':0.522,'milk':0.54,'heavy cream':0.51,'cream':0.51,'buttermilk':0.54,
  'honey':0.75,'maple syrup':0.71,'corn syrup':0.71,
  'black beans':0.44,'beans':0.42,'chickpeas':0.43,'lentils':0.435,
  'white rice':0.42,'brown rice':0.42,'rice':0.42,'basmati':0.42,
  'rolled oats':0.18,'oats':0.18,
  'cocoa powder':0.22,'cocoa':0.22,
  'baking soda':0.57,'baking powder':0.46,
  'kosher salt':0.29,'table salt':0.58,'salt':0.58,
  'cornstarch':0.28,'cornmeal':0.43,
  'almond flour':0.22,'breadcrumbs':0.265,'panko':0.14,
  'parmesan':0.35,'cheese':0.26,
  'nuts':0.28,'almonds':0.30,'walnuts':0.27,'pecans':0.25,
  'chocolate chips':0.37,'raisins':0.36,
  'default':0.5
};
const TSP_WEIGHT_G = {
  'salt':5.7,'kosher salt':3.0,'baking soda':6.0,'baking powder':4.6,
  'sugar':4.2,'flour':2.6,'cocoa':2.2,'pepper':2.3,
  'cumin':2.0,'paprika':2.3,'cinnamon':2.6,'default':3.0
};
// Produce & common count items: lbs per single piece
const COUNT_TO_LBS = {
  'onion':0.5,'onions':0.5,
  'tomato':0.33,'tomatoes':0.33,
  'lemon':0.25,'lemons':0.25,
  'lime':0.12,'limes':0.12,
  'orange':0.5,'oranges':0.5,
  'apple':0.44,'apples':0.44,
  'banana':0.27,'bananas':0.27,
  'potato':0.44,'potatoes':0.44,
  'sweet potato':0.44,
  'carrot':0.2,'carrots':0.2,
  'bell pepper':0.33,'pepper':0.33,
  'jalapeño':0.05,'jalapeno':0.05,
  'green chili':0.02,'green chilli':0.02,'green chillies':0.02,'chili':0.02,
  'garlic clove':0.01,'garlic':0.01,
  'shallot':0.1,'shallots':0.1,
  'egg':0.13,'eggs':0.13,
  'avocado':0.44,'avocados':0.44,
  'mango':0.75,'mangoes':0.75,
  'cucumber':0.66,'cucumbers':0.66,
  'zucchini':0.5,'zucchinis':0.5,
  'eggplant':1.0,'eggplants':1.0,
  'beet':0.44,'beets':0.44,
  'turnip':0.5,
};
function getCountLbs(name) {
  const n = name.toLowerCase();
  for (const [k,v] of Object.entries(COUNT_TO_LBS))
    if (n.includes(k)) return v;
  return null; // null = no known produce weight, keep as count
}
const LIQUID_KW = ['water','milk','cream','oil','juice','broth','stock','sauce',
  'vinegar','wine','beer','soda','syrup','extract','vanilla','honey','buttermilk',
  'whey','brine','coffee','tea','coconut milk','condensed','evaporated','rum',
  'liqueur','lemon juice','lime juice','orange juice',
  'yogurt','curd','lassi','kefir','buttermilk','whipping cream'];

// Natural-language unit keywords (longest first to avoid partial matches)
const NL_UNITS = [
  ['tablespoons','tbsp'],['tablespoon','tbsp'],['tbsps','tbsp'],['tbsp','tbsp'],['tbl','tbsp'],['tb','tbsp'],
  ['teaspoons','tsp'],['teaspoon','tsp'],['tsps','tsp'],['tsp','tsp'],
  ['spoons','tbsp'],['spoon','tbsp'],
  ['cups','cup'],['cup','cup'],
  ['fluid ounces','floz'],['fluid oz','floz'],['fl oz','floz'],['floz','floz'],
  ['ounces','oz'],['ounce','oz'],
  ['pounds','lbs'],['pound','lbs'],['lbs','lbs'],['lb','lbs'],
  ['kilograms','kg'],['kilogram','kg'],['kg','kg'],
  ['grams','g'],['gram','g'],['gms','g'],['gm','g'],
  ['milliliters','ml'],['millilitres','ml'],['ml','ml'],
  ['gallons','gal'],['gallon','gal'],['gal','gal'],
  ['quarts','qt'],['quart','qt'],['qt','qt'],['qts','qt'],
  ['liters','l'],['litres','l'],['liter','l'],['litre','l'],
  ['bunches','bunch'],['bunch','bunch'],
  ['cloves','clove'],['clove','clove'],
  ['sprigs','sprig'],['sprig','sprig'],
  ['stalks','stalk'],['stalk','stalk'],
  ['slices','slice'],['slice','slice'],
  ['packs','pack'],['pack','pack'],['packets','pack'],['packet','pack'],
  ['pieces','count'],['piece','count'],['pcs','count'],['pc','count'],
  ['each','count'],['nos','count'],['no','count'],
  ['handful','handful'],['handfuls','handful'],
  ['pinches','pinch'],['pinch','pinch'],
  ['dashes','dash'],['dash','dash'],
  ['whole','count'],
];


// ─── Helpers ──────────────────────────────────────────────────────────────────
function isLiquid(name) {
  const n = name.toLowerCase();
  return LIQUID_KW.some(k => n.includes(k));
}
function getCupLbs(name) {
  const n = name.toLowerCase();
  for (const [k,v] of Object.entries(CUP_TO_LBS))
    if (k !== 'default' && n.includes(k)) return v;
  return CUP_TO_LBS.default;
}
function getTspG(name) {
  const n = name.toLowerCase();
  for (const [k,v] of Object.entries(TSP_WEIGHT_G))
    if (k !== 'default' && n.includes(k)) return v;
  return TSP_WEIGHT_G.default;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtQ(n) {
  if (isNaN(n)||n===0) return '0';
  if (n>=100) return Math.round(n).toString();
  if (n>=10)  return (Math.round(n*10)/10).toFixed(1).replace(/\.0$/,'');
  if (n>=1)   return (Math.round(n*100)/100).toFixed(2).replace(/\.?0+$/,'');
  return (Math.round(n*1000)/1000).toFixed(3).replace(/\.?0+$/,'');
}

function matchUnit(s) {
  if (!s) return null;
  s = s.toLowerCase().trim().replace(/[.,!]$/,'');
  for (const [kw,mapped] of NL_UNITS)
    if (s===kw || s.startsWith(kw+' ') || s.startsWith(kw+',') || s.endsWith(' '+kw))
      return mapped;
  return null;
}

function parseFrac(s) {
  if (!s) return '';
  s = String(s).trim();
  const m = s.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if (m) return (parseInt(m[1])+parseInt(m[2])/parseInt(m[3])).toString();
  const f = s.match(/^(\d+)\/(\d+)$/);
  if (f) return (parseInt(f[1])/parseInt(f[2])).toString();
  // Handle leading-dot decimals: .5 → 0.5
  if (/^\.\d+$/.test(s)) return ('0'+s);
  return s.replace(/[^0-9.]/g,'');
}

function normalizeUnit(u) {
  if (!u) return 'count';
  // Normalize: lowercase, trim, collapse spaces, remove trailing punctuation
  const raw = u.toLowerCase().trim().replace(/\s+/g,' ').replace(/[.,!]+$/,'');
  // Check multi-word forms FIRST (before stripping spaces)
  const multiMap = {
    'fl oz':'floz','fluid oz':'floz','fluid ounce':'floz','fluid ounces':'floz',
    'fl. oz':'floz','fl. oz.':'floz',
    'oz (weight)':'oz','oz weight':'oz',
    'piece / each':'count','pieces / each':'count',
  };
  if (multiMap[raw]) return multiMap[raw];
  // Now strip non-alpha for single-word lookup
  const s = raw.replace(/[^a-z]/g,'');
  return ({
    tsp:'tsp',teaspoon:'tsp',teaspoons:'tsp',tsps:'tsp',
    tbsp:'tbsp',tablespoon:'tbsp',tablespoons:'tbsp',tbl:'tbsp',tb:'tbsp',tbs:'tbsp',
    cup:'cup',cups:'cup',
    floz:'floz',fluidoz:'floz',fluidounce:'floz',fluidounces:'floz',
    ml:'ml',milliliter:'ml',milliliters:'ml',millilitre:'ml',millilitres:'ml',
    l:'l',liter:'l',liters:'l',litre:'l',litres:'l',
    oz:'oz',ounce:'oz',ounces:'oz',
    lb:'lbs',lbs:'lbs',pound:'lbs',pounds:'lbs',
    g:'g',gram:'g',grams:'g',gm:'g',gms:'g',
    kg:'kg',kilogram:'kg',kilograms:'kg',
    qt:'qt',quart:'qt',quarts:'qt',qts:'qt',
    gal:'gal',gallon:'gal',gallons:'gal',
    bunch:'bunch',bunches:'bunch',
    clove:'clove',cloves:'clove',
    sprig:'sprig',sprigs:'sprig',
    stalk:'stalk',stalks:'stalk',
    slice:'slice',slices:'slice',
    piece:'count',pieces:'count',pc:'count',pcs:'count',each:'count',ea:'count',
    pack:'pack',packs:'pack',packet:'pack',packets:'pack',
    pinch:'pinch',pinches:'pinch',
    dash:'dash',dashes:'dash',
    handful:'handful',handfuls:'handful',
    whole:'count',nos:'count',no:'count',
    c:'cup',
  })[s] || 'count';
}

// ─── Natural language line parser ─────────────────────────────────────────────
const QUALIFIER_WORDS = /\b(large|small|medium|big|sized?|palm|size|fresh|dried|chopped|minced|sliced|diced|whole|ripe|raw|cooked|boneless|skinless|approx|approximately|about)\b/gi;

function parseRecipeLine(line) {
  line = line.trim().replace(/\s+/g,' ');
  if (!line || line.length < 2) return null;

  let namePart='', restPart='';

  // Split on first dash/colon/em-dash separating name from qty
  // Use a lookahead so "Fried Onion /Barista" (slash in name, no qty after) doesn't split on /
  const dashM = line.match(/^(.+?)\s*[-–—:]\s*(.+)$/);
  if (dashM) {
    namePart = dashM[1].trim();
    restPart = dashM[2].trim();
  } else {
    // No separator — find where a number (including leading-dot decimals) starts
    const ni = line.search(/(?<!\w)\d|(?<!\d)\.\d/);
    if (ni > 0) {
      namePart = line.slice(0,ni).trim().replace(/[\s,.\-\/]+$/,'');
      restPart  = line.slice(ni).trim();
    } else if (ni === 0) {
      // Line starts with a number — no name, skip
      return null;
    } else {
      // No digits — peel off trailing unit word if present
      const words = line.split(' ');
      const last  = words[words.length-1].toLowerCase();
      const uMatch = matchUnit(last);
      if (uMatch && words.length > 1)
        return { name:words.slice(0,-1).join(' '), qty:'1', unit:uMatch };
      return { name:line, qty:'1', unit:'count' };
    }
  }

  let qty='1', unit='count';
  // Match qty: supports  1  1.5  .5  .25  1/2  1 1/2  — leading dot decimals included
  const qm = restPart.match(/^((?:\d+\s+)?\d+\/\d+|\d*\.?\d+)\s*(.*)/);
  if (qm) {
    qty = parseFrac(qm[1].trim());
    let uRaw = qm[2].trim().toLowerCase().replace(/[.,!]+$/,'');
    let unitFound = null;
    for (const [kw, mapped] of NL_UNITS) {
      if (uRaw === kw || uRaw.startsWith(kw+' ') || uRaw.startsWith(kw+',')) {
        unitFound = mapped; break;
      }
    }
    if (!unitFound) {
      const stripped = uRaw.replace(QUALIFIER_WORDS,'').trim().replace(/\s+/g,' ').split(' ')[0];
      unitFound = matchUnit(stripped);
    }
    unit = unitFound || 'count';
    if (!unitFound && uRaw) return namePart ? { name:namePart, qty, unit:'count', _rawUnit:uRaw } : null;
  } else {
    const uOnly = matchUnit(restPart.toLowerCase());
    if (uOnly) { qty='1'; unit=uOnly; }
    else       { qty='1'; unit='count'; }
  }

  return namePart ? { name:namePart, qty, unit } : null;
}

// ─── Unit conversion ──────────────────────────────────────────────────────────
function convertUnit(qty, unit, name, liquid) {
  // Count: try produce weight lookup, otherwise pass through
  if (unit === 'count') {
    const lbsEach = getCountLbs(name);
    if (lbsEach !== null) {
      const lbs = qty * lbsEach;
      const oz = lbs * 16;
      if (lbs < 0.5) return {qty: oz, unit: 'oz'};
      return {qty: lbs, unit: 'lbs'};
    }
    return {qty, unit};
  }
  if (['pinch','dash','handful','bunch','clove','sprig','stalk','slice','pack'].includes(unit)) return {qty,unit};

  if (liquid) {
    let floz;
    switch(unit){
      case 'tsp':  floz=qty/6; break;
      case 'tbsp': floz=qty/2; break;
      case 'cup':  floz=qty*8; break;
      case 'floz': floz=qty; break;
      case 'oz':   floz=qty; break;
      case 'ml':   floz=qty/29.574; break;
      case 'l':    floz=qty*33.814; break;
      case 'qt':   floz=qty*32; break;
      case 'gal':  floz=qty*128; break;
      case 'lbs':  floz=qty*15.34; break;
      case 'g':    floz=qty/29.574; break;
      case 'kg':   floz=qty*1000/29.574; break;
      default: return {qty,unit};
    }
    if (floz<0.3)  return {qty:qty*(unit==='tsp'?1:3),unit:'tsp'};
    if (floz<1)    return {qty:floz*2,unit:'tbsp'};
    if (floz<8)    return {qty:floz,unit:'fl oz'};
    if (floz<32)   return {qty:floz/8,unit:'cup'};
    if (floz<128)  return {qty:floz/32,unit:'qt'};
    return {qty:floz/128,unit:'gal'};
  }

  // Dry → lbs
  let lbs;
  switch(unit){
    case 'tsp':  lbs=(qty*getTspG(name))/453.592; break;
    case 'tbsp': lbs=(qty*3*getTspG(name))/453.592; break;
    case 'cup':  lbs=qty*getCupLbs(name); break;
    case 'oz':   lbs=qty/16; break;
    case 'lbs':  lbs=qty; break;
    case 'g':    lbs=qty/453.592; break;
    case 'kg':   lbs=qty*2.20462; break;
    case 'qt':   lbs=qty*2.086; break;  // dry quart ≈ 2.086 lbs (approx for dry goods)
    case 'gal':  lbs=qty*8.345; break;
    case 'floz': return {qty,unit:'fl oz'};
    case 'ml':   lbs=qty/453.592; break;
    default: return {qty,unit};
  }
  const oz=lbs*16;
  if (oz<0.18){ const t=(lbs*453.592)/getTspG(name); return t<=1.5?{qty:t,unit:'tsp'}:{qty:t/3,unit:'tbsp'}; }
  if (lbs<0.5) return {qty:oz,unit:'oz'};
  return {qty:lbs,unit:'lbs'};
}

function dispUnit(unit,liq){
  if ((unit==='oz'||unit==='floz')&&liq) return 'fl oz';
  if (unit==='floz') return 'fl oz';
  return unit;
}
const PLURAL_MAP = {
  'tsp':'tsp','tbsp':'tbsp','cup':'cups','fl oz':'fl oz',
  'qt':'qts','gal':'gal','ml':'ml','l':'l',
  'oz':'oz','lbs':'lbs','g':'g','kg':'kg',
  'bunch':'bunches','clove':'cloves','sprig':'sprigs',
  'stalk':'stalks','slice':'slices','pack':'packs',
  'count':'','pinch':'pinches','dash':'dashes','handful':'handfuls',
};
function pluralUnit(unit, qty) {
  if (unit === 'count') return ''; // count: just show the number
  if (qty <= 1) return unit;
  return PLURAL_MAP[unit] !== undefined ? PLURAL_MAP[unit] : (unit+'s');
}
function fmtQU(qty, unit, liq) {
  const u = dispUnit(unit, liq);
  const pu = pluralUnit(u, qty);
  return fmtQ(qty) + (pu ? ' '+pu : '');
}
// For kitchen measure column: show weight conversion for produce, else show count with label
function fmtConv(conv, ing) {
  if (ing.noQty) return 'scale as needed';
  if (conv.unit === 'count') {
    // No produce weight known — show as "X (count)"
    const n = fmtQ(conv.qty);
    return n + ' (count)';
  }
  return fmtQU(conv.qty, conv.unit, ing.liq);
}

// Cooking expansion factors — cooked weight / dry weight
// e.g. rice absorbs water and roughly doubles in weight when cooked
const COOK_EXPANSION = {
  'rice':2.0,'basmati':2.0,'white rice':2.0,'brown rice':2.2,'jasmine rice':2.0,
  'soaked rice':2.0,'soaked basmati':2.0,
  'quinoa':2.8,
  'lentils':2.5,'red lentils':2.5,'green lentils':2.5,'dal':2.5,
  'chickpeas':2.5,'black beans':2.5,'kidney beans':2.5,'beans':2.5,
  'oats':2.0,'rolled oats':2.0,'oatmeal':2.0,
  'pasta':2.3,'spaghetti':2.3,'noodles':2.3,
  'barley':2.5,
};
function getCookExpansion(name) {
  const n = name.toLowerCase();
  for (const [k,v] of Object.entries(COOK_EXPANSION))
    if (n.includes(k)) return v;
  return 1.0; // no expansion — raw/dry weight used as-is
}
function toLbs(qty, unit, liquid, name) {
  name = name || '';
  if (['count','pack','bunch','clove','sprig','stalk','slice','pinch','dash','handful'].includes(unit)) return null;
  var lbs;
  if (liquid) {
    var floz;
    switch(unit){
      case 'tsp':   floz=qty/6; break;
      case 'tbsp':  floz=qty/2; break;
      case 'cup':   floz=qty*8; break;
      case 'fl oz': floz=qty; break;
      case 'oz':    floz=qty; break;
      case 'qt':    floz=qty*32; break;
      case 'gal':   floz=qty*128; break;
      case 'ml':    floz=qty/29.574; break;
      case 'l':     floz=qty*33.814; break;
      case 'lbs':   lbs=qty; break;
      default: return null;
    }
    if(lbs===undefined) lbs=floz*0.0652;
  } else {
    switch(unit){
      case 'oz':   lbs=qty/16; break;
      case 'lbs':  lbs=qty; break;
      case 'g':    lbs=qty/453.592; break;
      case 'kg':   lbs=qty*2.20462; break;
      case 'tsp':  lbs=(qty*3)/453.592; break;
      case 'tbsp': lbs=(qty*9)/453.592; break;
      case 'fl oz':lbs=qty*0.0652; break;
      case 'qt':   lbs=qty*2.086; break;
      case 'gal':  lbs=qty*8.345; break;
      default: return null;
    }
  }
  return lbs * getCookExpansion(name);
}
const OZ_VAL={servings:1,counts:1,'16oz':16,'12oz':12,'8oz':8,'4oz':4};
function calcSF(bc,bu,tc,tu){ return (tc*(OZ_VAL[tu]||1))/(bc*(OZ_VAL[bu]||1)); }

function addRow(rid, name, qty, unit, unknown){
  name=name||''; qty=qty||''; unit=unit||'count'; unknown=unknown||false;
  var tbody=document.getElementById('ilist-'+rid);
  var rowId='r'+rid+'-'+(iCnt[rid]++);
  var tr=document.createElement('tr');
  tr.id=rowId;
  if(unknown) tr.style.background='#fff8e1';
  var unitCell = unknown
    ? `<input type="text" data-f="unit" data-custom="1" placeholder="e.g. bunch" value="${esc(unit)}" style="width:100%;border:2px solid #f0ad4e;border-radius:6px;padding:5px 7px;font-size:.85rem;background:#fff8e1" title="Unit not recognized — please verify">`
    : `<select data-f="unit">${_unitOpts(unit)}</select>`;
  tr.innerHTML=`
    <td><input type="text" data-f="name" placeholder="Ingredient name" value="${esc(name)}"></td>
    <td><input type="text" inputmode="decimal" data-f="qty" placeholder="0" style="width:90px" value="${qty}"></td>
    <td>${unitCell}${unknown?'<span title="Unrecognized unit — please verify or type a known unit" style="color:#e67e00;font-size:.8rem;margin-left:4px">⚠️</span>':''}</td>
    <td><button class="btn br sm" onclick="document.getElementById('${rowId}').remove()">✕</button></td>`;
  tbody.appendChild(tr);
}
function clearRows(rid){ document.getElementById('ilist-'+rid).innerHTML=''; }

// ─── Paste handler ────────────────────────────────────────────────────────────
function handlePaste(e, rid){
  var text=(e.clipboardData||window.clipboardData).getData('text');
  if(!text.trim()) return;
  e.preventDefault();

  var raw=text.trim();
  // Insert newlines before uppercase after lowercase (handles concatenated copy)
  raw=raw.replace(/([a-z0-9.,])([A-Z])/g,'$1\n$2');
  raw=raw.replace(/\.\s+([A-Z])/g,'\n$1');
  // Split multiple entries concatenated on one line e.g. "curry leaves - 1 bunch coriander leaves - 3 bunches"
  // Require at least 2 words before the " - number" to avoid splitting "Basmati soaked - 3 cups"
  raw=raw.replace(/(\d+(?:\s+\w+)?)\s+([a-zA-Z][a-zA-Z]+(?:\s+[a-zA-Z]+)+?)\s*[-–—]\s*(\d)/g,'$1\n$2 - $3');

  var lines=raw.split(/\r?\n/).map(function(l){return l.trim();}).filter(function(l){return l.length>1;});

  clearRows(rid);
  var unrecognized=[];
  lines.forEach(function(line){
    var tabs=line.split('\t').map(function(p){return p.trim();});

    if(tabs.length>=2){
      // Detect Excel column order: could be Name|Qty|Unit or Qty|Unit|Name etc.
      // Strategy: find which tab has a number, which has a unit keyword, which is the name

      var qIdx=-1, uIdx=-1, nIdx=-1;

      // Find quantity column (numeric or fraction)
      for(var i=0;i<tabs.length;i++){
        if(/^((?:\d+\s+)?\d+\/\d+|\d+(?:[.,]\d+)?)$/.test(tabs[i].trim())){
          qIdx=i; break;
        }
      }

      // Find unit column (matches a known unit keyword)
      for(var i=0;i<tabs.length;i++){
        if(i===qIdx) continue;
        var candidate=tabs[i].toLowerCase().trim().replace(/[.,!]+$/,'');
        var mapped=normalizeUnit(candidate);
        // Only treat as unit column if it actually maps to something meaningful
        if(mapped!=='count' || candidate==='count'||candidate==='piece'||candidate==='pieces'||candidate==='each'||candidate==='pc'||candidate==='pcs'){
          uIdx=i; break;
        }
      }

      // Name is the remaining column
      for(var i=0;i<tabs.length;i++){
        if(i!==qIdx && i!==uIdx){ nIdx=i; break; }
      }

      if(qIdx>=0 && nIdx>=0){
        var n=tabs[nIdx]||'';
        var q=parseFrac(tabs[qIdx]);
        var rawUnit=uIdx>=0?tabs[uIdx]:'';
        var u=rawUnit?normalizeUnit(rawUnit):'count';
        var isUnknown=false;
        if(u==='count' && rawUnit && !['count','piece','pieces','each','pc','pcs','pack','whole',''].includes(rawUnit.toLowerCase().trim())){
          // Pass raw unit through as custom text, flag row
          u=rawUnit; isUnknown=true;
        }
        if(n){ addRow(rid,n,q,u,isUnknown); return; }
      }
    }

    // Fall back to natural language parser
    var p=parseRecipeLine(line);
    if(p){
      var isUnknown=p.unit==='count' && p._rawUnit && !['count','piece','pieces','each','pc','pcs','pack','packs','packet','whole',''].includes(p._rawUnit.toLowerCase().trim());
      addRow(rid,p.name,p.qty,isUnknown?p._rawUnit:p.unit,isUnknown);
    }
  });
}

// ─── Get ingredients ──────────────────────────────────────────────────────────
function getIngredients(rid){
  var rows=document.querySelectorAll('#ilist-'+rid+' tr');
  var result=[];
  rows.forEach(function(row){
    var name=(row.querySelector('[data-f="name"]')||{}).value||'';
    name=name.trim();
    var qtyRaw=(row.querySelector('[data-f="qty"]')||{}).value||'';
    var qty=parseFloat(qtyRaw);
    var unitEl=row.querySelector('[data-f="unit"]');
    var unit=(unitEl||{}).value||'count';
    // Custom text inputs keep the raw string; normalize it one more time in case user typed a known unit
    if(unitEl && unitEl.dataset.custom){
      unit=normalizeUnit(unit.trim())==='count' && unit.trim() ? unit.trim() : normalizeUnit(unit.trim());
    }
    if(!name) return;
    var liq=isLiquid(name);
    var noQty=isNaN(qty)||qty<=0;
    var isPantry=noQty||(unit==='count'&&noQty);
    result.push({name,qty:noQty?1:qty,unit,liq,noQty:isPantry});
  });
  return result;
}

// ─── Scale ────────────────────────────────────────────────────────────────────
function doScale(rid){
  var bc=parseFloat(document.getElementById('bc-'+rid).value);
  var bu=document.getElementById('bu-'+rid).value;
  var tc=parseFloat(document.getElementById('tc-'+rid).value);
  var tu=document.getElementById('tu-'+rid).value;
  var rname=document.getElementById('rname-'+rid).value||recipes.find(function(r){return r.id===rid;})||'';
  if(typeof rname==='object') rname=rname.name;

  if(!bc||!tc){ alert('Enter base and target amounts.'); return; }
  var ings=getIngredients(rid);
  if(!ings.length){ alert('Add at least one ingredient.'); return; }

  var sf=calcSF(bc,bu,tc,tu);

  document.getElementById('si-'+rid).innerHTML=`
    <div><div class="si-lbl">Recipe</div><div class="si-val">${esc(rname)}</div></div>
    <div><div class="si-lbl">Original</div><div class="si-val">${bc} ${bu}</div></div>
    <div><div class="si-lbl">Target</div><div class="si-val">${tc} ${tu}</div></div>
    <div><div class="si-lbl">Scaling Factor</div><div class="si-val big">×${sf.toFixed(3)}</div></div>`;

  var tbody=document.getElementById('rb-'+rid);
  tbody.innerHTML='';
  var conversions=[];
  ings.forEach(function(ing){
    var sq=ing.qty*sf;
    var conv=convertUnit(sq,ing.unit,ing.name,ing.liq);
    var badge=ing.liq?'<span class="liq-badge">liquid</span>':'';
    var origD=ing.noQty?'pantry':fmtQU(ing.qty,ing.unit,ing.liq);
    var scalD=ing.noQty?'pantry':fmtQU(sq,ing.unit,ing.liq);
    var convD=fmtConv(conv,ing);
    // Track conversion if unit changed
    if(!ing.noQty && conv.unit !== dispUnit(ing.unit,ing.liq)){
      conversions.push({name:ing.name, fromQty:sq, fromUnit:dispUnit(ing.unit,ing.liq), toQty:conv.qty, toUnit:conv.unit});
    }
    var tr=document.createElement('tr');
    tr.innerHTML=`<td class="ing-name">${esc(ing.name)} ${badge}</td>`
      +`<td class="col-orig">${origD}</td><td class="col-scaled">${scalD}</td><td class="col-kitchen">${convD}</td>`;
    tbody.appendChild(tr);
  });

  // Build conversion legend — unit conversions + produce weight assumptions
  var legendEl=document.getElementById('legend-'+rid);
  var produceNotes=[];
  ings.forEach(function(ing){
    if(ing.unit==='count'){
      var lbsEach=getCountLbs(ing.name);
      if(lbsEach!==null) produceNotes.push(`${esc(ing.name)}: ${lbsEach} lbs each`);
    }
  });
  if(conversions.length || produceNotes.length){
    var html='';
    if(conversions.length){
      html+='<div class="legend-title">Conversions applied</div>'
        +conversions.map(function(c){
          return `<span class="legend-item">${esc(c.name)}: ${fmtQ(c.fromQty)} ${c.fromUnit} → ${fmtQ(c.toQty)} ${pluralUnit(c.toUnit,c.toQty)}</span>`;
        }).join('');
    }
    if(produceNotes.length){
      html+='<div class="legend-title" style="margin-top:8px">Produce weight used</div>'
        +produceNotes.map(function(n){return `<span class="legend-item">${n}</span>`;}).join('');
    }
    legendEl.innerHTML=html;
    legendEl.style.display='block';
  } else {
    legendEl.style.display='none';
  }

  // ─── Tally: sum all kitchen measures in lbs, compare to target ───────────────
  const OZ_PER_SERVING = {'16oz':16,'12oz':12,'8oz':8,'4oz':4,'servings':null,'counts':null};
  var totalLbs=0, skippedItems=[], expandedItems=[];
  ings.forEach(function(ing){
    if(ing.noQty){ skippedItems.push(ing.name); return; }
    var sq=ing.qty*sf;
    var conv=convertUnit(sq,ing.unit,ing.name,ing.liq);
    var lbs=toLbs(conv.qty, conv.unit, ing.liq, ing.name);
    if(lbs===null){ skippedItems.push(ing.name); }
    else {
      totalLbs+=lbs;
      var exp=getCookExpansion(ing.name);
      if(exp>1.0) expandedItems.push(`${esc(ing.name)}: ×${exp} (cooked)`);
    }
  });

  var tallyEl=document.getElementById('tally-'+rid);
  var ozPerServing=OZ_PER_SERVING[tu];
  var skippedNote=skippedItems.length
    ? `<div class="tally-skipped">Excluded (no weight): ${skippedItems.map(function(s){return esc(s);}).join(', ')}</div>`
    : '';
  var expandedNote=expandedItems.length
    ? `<div class="tally-skipped" style="color:#888">Cook expansion applied: ${expandedItems.join(', ')}</div>`
    : '';

  if(ozPerServing){
    var expectedLbs=(tc*ozPerServing)/16;
    var diffPct=Math.abs(totalLbs-expectedLbs)/expectedLbs*100;
    var ok=diffPct<=15;
    var statusIcon=ok?'✅':'⚠️';
    var statusColor=ok?'#1a7a45':'#b7600a';
    tallyEl.innerHTML=`
      <div class="legend-title">Weight Tally</div>
      <div class="tally-row">
        <span class="tally-label">Total weighed ingredients</span>
        <span class="tally-val">${fmtQ(totalLbs)} lbs</span>
      </div>
      <div class="tally-row">
        <span class="tally-label">Expected &nbsp;(${tc} × ${ozPerServing} oz)</span>
        <span class="tally-val">${fmtQ(expectedLbs)} lbs</span>
      </div>
      <div class="tally-row tally-status" style="color:${statusColor}">
        <span>${statusIcon} ${ok?'Looks good':'Check quantities'} — ${diffPct.toFixed(1)}% ${totalLbs>expectedLbs?'over':'under'} expected</span>
      </div>
      ${expandedNote}
      ${skippedNote}`;
  } else {
    tallyEl.innerHTML=`
      <div class="legend-title">Weight Tally</div>
      <div class="tally-row">
        <span class="tally-label">Total weighed ingredients</span>
        <span class="tally-val">${fmtQ(totalLbs)} lbs</span>
      </div>
      <div class="tally-row" style="color:#aaa;font-size:.78rem">
        <span>Select an oz serving size (e.g. 12 oz) to validate against target</span>
      </div>
      ${expandedNote}
      ${skippedNote}`;
  }
  tallyEl.style.display='block';

  var sec=document.getElementById('res-'+rid);
  sec.classList.remove('hidden');
  sec.scrollIntoView({behavior:'smooth'});
}

// ─── Export ───────────────────────────────────────────────────────────────────
function _exportData(rid){
  var bc=parseFloat(document.getElementById('bc-'+rid).value);
  var bu=document.getElementById('bu-'+rid).value;
  var tc=parseFloat(document.getElementById('tc-'+rid).value);
  var tu=document.getElementById('tu-'+rid).value;
  return {sf:calcSF(bc,bu,tc,tu),bc,bu,tc,tu,
    rname:document.getElementById('rname-'+rid).value||'',
    ings:getIngredients(rid)};
}
function copySheets(rid){
  var d=_exportData(rid);
  var lines=['Ingredient\tKitchen Measurement'];
  d.ings.forEach(function(ing){
    var sq=ing.qty*d.sf;
    var c=convertUnit(sq,ing.unit,ing.name,ing.liq);
    var cv=fmtConv(c,ing);
    lines.push(ing.name+'\t'+cv);
  });
  _copy(lines.join('\n'),'✅ Copied for Google Sheets!');
}
function copyTxt(rid){
  var d=_exportData(rid);
  var lines=['SCALED RECIPE','='.repeat(46),'Recipe: '+d.rname,
    'Original: '+d.bc+' '+d.bu+'  →  Target: '+d.tc+' '+d.tu,
    'Scaling Factor: '+d.sf.toFixed(3)+'x','','INGREDIENTS:','-'.repeat(46)];
  d.ings.forEach(function(ing){
    var sq=ing.qty*d.sf;
    var c=convertUnit(sq,ing.unit,ing.name,ing.liq);
    var cv=fmtConv(c,ing);
    lines.push(ing.name.padEnd(32)+cv);
  });
  _copy(lines.join('\n'),'✅ Copied as text!');
}
function _copy(text,msg){
  navigator.clipboard.writeText(text).then(function(){notify(msg);}).catch(function(){
    var ta=document.createElement('textarea');
    ta.value=text; ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); notify(msg);
  });
}
function notify(msg){
  document.querySelectorAll('.notif').forEach(function(n){n.remove();});
  var el=document.createElement('div'); el.className='notif'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},3000);
}
function resetPanel(rid){
  document.getElementById('bc-'+rid).value='5';
  document.getElementById('tc-'+rid).value='60';
  clearRows(rid); addRow(rid);
  document.getElementById('res-'+rid).classList.add('hidden');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
addRecipe('Recipe 1');
</script>
